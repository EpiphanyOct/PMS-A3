<h2>物品管理</h2>  
<form (ngSubmit)="addItem()">  
    <!-- 表单字段 -->  
    <input type="text" [(ngModel)]="newItem.id" name="itemId" placeholder="物品ID" required>  
    <input type="text" [(ngModel)]="newItem.name" name="itemName" placeholder="物品名称" required>  
    <select [(ngModel)]="newItem.category" name="category" required>  
        <option value="">选择类别</option>  
        <option value="Electronics">电子产品</option>  
        <option value="Furniture">家具</option>  
        <option value="Clothing">服装</option>  
        <option value="Tools">工具</option>  
        <option value="Miscellaneous">杂项</option>  
    </select>  
    <input type="number" [(ngModel)]="newItem.quantity" name="quantity" placeholder="数量" required>  
    <input type="number" [(ngModel)]="newItem.price" name="price" placeholder="价格" required>  
    <input type="text" [(ngModel)]="newItem.supplierName" name="supplierName" placeholder="供应商名称" required>  
    <select [(ngModel)]="newItem.stockStatus" name="stockStatus" required>  
        <option value="In Stock">库存</option>  
        <option value="Low Stock">低库存</option>  
        <option value="Out of Stock">缺货</option>  
    </select>  
    <select [(ngModel)]="newItem.featured" name="featuredItem">  
        <option value="No">否</option>  
        <option value="Yes">是</option>  
    </select>  
    <textarea [(ngModel)]="newItem.specialNote" name="specialNote" placeholder="特别备注"></textarea>  
    <button type="submit">添加物品</button>  
</form>  

<h3>物品列表</h3>  
<div *ngFor="let item of inventory">  
    <p>{{ item.name }} - {{ item.category }} - {{ item.quantity }} - {{ item.price }}元</p>  
    <button (click)="deleteItem(item.id)">删除</button>  
</div>
