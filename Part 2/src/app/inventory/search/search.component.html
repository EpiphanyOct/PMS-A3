<h1>Search Items</h1>
<input type="text" [(ngModel)]="searchTerm" placeholder="Enter item name">
<button (click)="searchItems()">Search</button>
<table>
  <tr>
    <th>ID</th>
    <th>Name</th>
    <th>Category</th>
    <th>Quantity</th>
    <th>Price</th>
    <th>Supplier</th>
    <th>Stock Status</th>
    <th>Featured</th>
  </tr>
  <tr *ngFor="let item of searchItems()">
    <td>{{ item.id }}</td>
    <td>{{ item.name }}</td>
    <td>{{ item.category }}</td>
    <td>{{ item.quantity }}</td>
    <td>{{ item.price }}</td>
    <td>{{ item.supplier }}</td>
    <td>{{ item.stockStatus }}</td>
    <td>{{ item.featured ? 'Yes' : 'No' }}</td>
  </tr>
</table>
